<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Compras</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-page-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .login-box {
            background: white;
            border-radius: 12px;
            padding: 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .login-box h2 {
            color: #2E4057;
            margin-bottom: 24px;
            font-size: 1.4rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-izq">
            <h1>🛒 Sistema de Compras</h1>
        </div>
        <div class="nav-der">
            <a href="../index.html" class="nav-link">🏠 Inicio</a>
            <div id="auth-nav-btn"></div>
        </div>
    </header>

    <div class="login-page-wrap">
        <div class="login-box">
            <h2>🔑 Accede a tu cuenta</h2>

            <div class="modal-tabs">
                <button id="tab-login"    class="tab-activo" onclick="cambiarTab('login')">
                    Iniciar sesión
                </button>
                <button id="tab-register" onclick="cambiarTab('register')">
                    Registrarse
                </button>
            </div>

            <div id="form-login">
                <div id="error-login" class="error-msg"></div>
                <div class="campo">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" placeholder="tu@correo.com">
                </div>
                <div class="campo">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button id="btn-login-submit" class="btn-submit" onclick="handleLogin()">
                    Ingresar
                </button>
                <p class="cambiar-tab">
                    ¿No tienes cuenta?
                    <a onclick="cambiarTab('register')">Regístrate gratis</a>
                </p>
            </div>

            <div id="form-register" style="display:none;">
                <div id="error-register" class="error-msg"></div>
                <div class="campo">
                    <label for="reg-nombre">Nombre completo</label>
                    <input type="text" id="reg-nombre" placeholder="Nicolás García">
                </div>
                <div class="campo">
                    <label for="reg-email">Correo electrónico</label>
                    <input type="email" id="reg-email" placeholder="tu@correo.com">
                </div>
                <div class="campo">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="campo">
                    <label for="reg-confirm">Confirmar contraseña</label>
                    <input type="password" id="reg-confirm" placeholder="Repite tu contraseña">
                </div>
                <button id="btn-register-submit" class="btn-submit" onclick="handleRegister()">
                    Crear cuenta
                </button>
                <p class="cambiar-tab">
                    ¿Ya tienes cuenta?
                    <a onclick="cambiarTab('login')">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        if (isLoggedIn()) {
            window.location.href = '../index.html';
        }

        function onLoginExitoso() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
