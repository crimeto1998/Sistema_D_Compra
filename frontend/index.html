<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Compras</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>🛒 Sistema de Compras</h1>
        <a href="pages/carrito.html">
            Ver Carrito (<span id="contador">0</span>)
        </a>
    </header>

    <main>
        <h2>Productos</h2>
        <div id="lista-productos">
            <div class="producto">
                <h3>Producto 1</h3>
                <p>Precio: $10.000</p>
                <button onclick="agregarAlCarrito('Producto 1', 10000)">
                    Agregar al carrito
                </button>
            </div>
            <div class="producto">
                <h3>Producto 2</h3>
                <p>Precio: $25.000</p>
                <button onclick="agregarAlCarrito('Producto 2', 25000)">
                    Agregar al carrito
                </button>
            </div>
            <div class="producto">
                <h3>Producto 3</h3>
                <p>Precio: $15.000</p>
                <button onclick="agregarAlCarrito('Producto 3', 15000)">
                    Agregar al carrito
                </button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
